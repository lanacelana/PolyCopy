<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0f141c;         /* Super Deep Navy */
      --bg-item: #1b222c;         /* Medium Slate Blue */
      --border-item: #293241;     /* Light Slate */
      --accent-gold: #cca47c;     /* Luxury Gold / Tan */
      --text-light: #f4eae1;      /* Off-White Cream */
      --text-muted: #8a95a5;      /* Muted Steel Grey */
      --btn-clear-bg: #8b2635;    /* Muted Rose/Red */
      --btn-success-bg: #2d6a4f;  /* Deep Forest Green */
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    
    body {
      width: 320px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: var(--bg-main);
      color: var(--text-light);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent-gold);
      letter-spacing: 0.5px;
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .status-text.enabled {
      color: var(--accent-gold);
    }

    /* Switch Container */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--bg-item);
      border: 1px solid var(--border-item);
      transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: var(--text-muted);
      transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: rgba(204, 164, 124, 0.15);
      border-color: var(--accent-gold);
    }
    input:checked + .slider:before {
      transform: translateX(22px);
      background-color: var(--accent-gold);
      box-shadow: 0 0 6px var(--accent-gold);
    }

    .list-container {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid var(--border-item);
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 16px;
      background-color: rgba(27, 34, 44, 0.3);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Custom Scrollbar */
    .list-container::-webkit-scrollbar {
      width: 4px;
    }
    .list-container::-webkit-scrollbar-thumb {
      background: var(--border-item);
      border-radius: 10px;
    }
    .list-container::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .text-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--bg-item);
      border: 1px solid var(--border-item);
      border-radius: 8px;
      font-size: 12px;
      transition: all 0.2s ease;
    }
    .text-item:hover {
      border-color: var(--accent-gold);
      transform: translateY(-1px);
    }
    .text-content {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 85%;
      color: var(--text-light);
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
      transition: all 0.2s ease;
    }
    .delete-btn:hover {
      color: #ef4444;
      transform: scale(1.2);
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .clear-btn {
      background: var(--btn-clear-bg);
      color: #ffffff;
    }
    .clear-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }
    .copy-all-btn {
      background: var(--accent-gold);
      color: var(--bg-main);
    }
    .copy-all-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .copy-all-btn:active, .clear-btn:active {
      transform: translateY(0);
    }
    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .footer .signature {
      color: var(--accent-gold);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Smart Multi-Copy</h3>
    <div class="status-container">
      <span class="status-text" id="statusText">Active</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div class="list-container" id="listContainer">
  </div>
  <div class="actions">
    <button class="clear-btn" id="clearBtn">Clear All</button>
    <button class="copy-all-btn" id="copyAllBtn">Copy All</button>
  </div>
  <div class="footer">
    crafted by <span class="signature">lncln</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
