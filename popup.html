<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0b2114;         /* Deepest Acid Forest (almost black-green) */
      --bg-item: #1a4d2e;         /* Deep Forest Green */
      --border-item: #2c6a43;     /* Medium Forest Green */
      --accent-gold: #dfff00;     /* Acid Lime/Yellow-Green */
      --text-light: #f2ffe5;      /* Soft Lime-White */
      --text-muted: #7fa38a;      /* Muted Sage Green */
      --btn-clear-bg: #8b2635;    /* Muted Rose/Red */
      --btn-success-bg: #2d6a4f;  /* Deep Forest Green */
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }
    
    body {
      width: 320px;
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      margin: 0;
      background-color: var(--bg-main);
      color: var(--text-light);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent-gold);
      letter-spacing: 0.5px;
    }

    /* Header Status Badge */
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      background-color: rgba(204, 164, 124, 0.12);
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    .status-badge.off {
      background-color: rgba(139, 38, 53, 0.12);
      color: #ef4444;
      border-color: #ef4444;
    }

    /* Mode Selector Buttons */
    .mode-selector {
      display: flex;
      background: var(--bg-item);
      border: 1px solid var(--border-item);
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 12px;
      gap: 4px;
    }
    
    .mode-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 8px 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Roboto', sans-serif;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .mode-btn:hover {
      color: var(--text-light);
      background: rgba(255, 255, 255, 0.03);
    }
    
    .mode-btn.active {
      background: var(--border-item);
      color: var(--accent-gold);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .mode-btn.active .icon {
      filter: drop-shadow(0 0 4px var(--accent-gold));
    }

    .mode-btn .icon {
      font-size: 14px;
    }

    /* Tab Status Card */
    .tab-status-card {
      background: linear-gradient(135deg, rgba(27, 34, 44, 0.6) 0%, rgba(41, 50, 65, 0.3) 100%);
      border: 1px dashed var(--accent-gold);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      max-height: 80px;
      overflow: hidden;
    }

    .tab-status-card.hidden {
      opacity: 0;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      border-color: transparent;
      pointer-events: none;
    }

    .tab-status-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-width: 70%;
    }

    .tab-status-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
    }

    .tab-status-desc {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Switch Container */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--bg-item);
      border: 1px solid var(--border-item);
      transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: var(--text-muted);
      transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: rgba(204, 164, 124, 0.15);
      border-color: var(--accent-gold);
    }
    input:checked + .slider:before {
      transform: translateX(22px);
      background-color: var(--accent-gold);
      box-shadow: 0 0 6px var(--accent-gold);
    }

    .list-container {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border-item);
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 12px;
      background-color: rgba(27, 34, 44, 0.3);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Custom Scrollbar */
    .list-container::-webkit-scrollbar {
      width: 4px;
    }
    .list-container::-webkit-scrollbar-thumb {
      background: var(--border-item);
      border-radius: 10px;
    }
    .list-container::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .text-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--bg-item);
      border: 1px solid var(--border-item);
      border-radius: 8px;
      font-size: 12px;
      transition: all 0.2s ease;
      color: var(--text-light);
    }
    .text-item:hover {
      border-color: var(--accent-gold);
      transform: translateY(-1px);
    }
    .text-item.type-link {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: #0b2114;
    }
    .text-item.type-link .text-content {
      color: #0b2114;
      font-weight: 600;
    }
    .text-item.type-link .delete-btn {
      color: rgba(11, 33, 20, 0.6);
    }
    .text-item.type-link .delete-btn:hover {
      color: #8b2635;
    }
    .text-content {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 85%;
      color: inherit;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
      transition: all 0.2s ease;
    }
    .delete-btn:hover {
      color: #ef4444;
      transform: scale(1.2);
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    .actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      font-family: 'Roboto', sans-serif;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .clear-btn {
      background: var(--btn-clear-bg);
      color: #ffffff;
    }
    .clear-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }
    .copy-all-btn {
      background: var(--accent-gold);
      color: var(--bg-main);
    }
    .copy-all-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .copy-all-btn:active, .clear-btn:active {
      transform: translateY(0);
    }
    
    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .footer .signature {
      color: var(--accent-gold);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Smart Multi-Copy</h3>
    <span class="status-badge" id="globalStatus">Enabled</span>
  </div>

  <div class="mode-selector">
    <button class="mode-btn" id="modeGlobal" title="Active on all tabs">
      <span class="icon">🌐</span> All Tabs
    </button>
    <button class="mode-btn" id="modeTab" title="Active on this tab only">
      <span class="icon">📄</span> This Tab Only
    </button>
    <button class="mode-btn" id="modeOff" title="Switch off the extension">
      <span class="icon">🔌</span> Switch Off
    </button>
  </div>

  <div class="tab-status-card" id="tabStatusCard">
    <div class="tab-status-info">
      <span class="tab-status-title">Active on this tab</span>
      <span class="tab-status-desc" id="tabUrlDesc">checking...</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="tabToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="list-container" id="listContainer">
  </div>
  
  <div class="actions">
    <button class="clear-btn" id="clearBtn">Clear All</button>
    <button class="copy-all-btn" id="copyAllBtn">Copy All</button>
  </div>
  
  <div class="footer">
    made by <span class="signature">lncln</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
